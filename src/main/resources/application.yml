# Logging Dev Env
logging:
  level:
    com.zaxxer.hikari.HikariConfig: DEBUG
    com.zaxxer.hikari: TRACE
    root: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  file:
    name: logs/kalkual-system-dev.log

server:
  port: 8080
  tomcat:
    threads:
      min-spare: 20
      max: 300                      # naikkan thread pool
    accept-count: 200
    max-connections: 20000          # untuk banyak koneksi
  connection-timeout: 10s
  servlet:
    context-path: /app-dev
    session:
      timeout: 30m
  compression:                      # aktifkan compression
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
   
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,threaddump,heapdump,env,logfile
  endpoint:
    health:
      show-details: when_authorized # lebih aman
  health:
    mail:
      enabled: true
    db:
      enabled: true
      
file:
  upload-dir: /var/app/uploads      # pakai absolute path di production