spring:
  mail:
    host: meprofarm.ho
    port: 587
    username: noreply@meprofarm.ho
    password: ${MAIL_PASSWORD} # gunakan environment variable
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.ssl.trust: meprofarm.ho
  
  datasource:
    url: "jdbc:oracle:thin:@192.168.50.6:1521:otmpf"
    username: kalkual_mepro
    password: kalkual_meprofarm1
    hikari:
     maximum-pool-size: 10
     minimum-idle: 2 
     idle-timeout: 30000
     max-lifetime: 1800000
     connection-timeout: 30000
     pool-name: applicationPool

  jpa:
    show-sql: true                 # jangan tampilkan SQL di production (set: false)
    hibernate:
      ddl-auto: none                # jangan auto update schema di production
    database-platform: org.hibernate.dialect.OracleDialect
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 30            # optimasi insert/update batch
        order_inserts: true
        order_updates: true

  thymeleaf:
    cache: false                     # aktifkan cache di production(set: true)
    prefix: classpath:/templates/
    mode: HTML
  
  web:
    resources:
      cache:
        period: PT60M               # cache static resources selama 1 jam
      add-mappings: true
      
