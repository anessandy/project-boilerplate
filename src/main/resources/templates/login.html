<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Kalkual</title>
    <link rel="stylesheet" th:href="@{/adminlte/css/adminlte.min.css}">
    <link rel="stylesheet" th:href="@{/adminlte/plugins/fontawesome-free/css/all.min.css}">
    <style>
        /* Fix input dark mode */
        .dark-mode .form-control {
            background-color: #343a40;
            color: #fff;
            border-color: #6c757d;
        }

        /* Fix autofill Chrome */
        .dark-mode input:-webkit-autofill,
        .dark-mode input:-webkit-autofill:hover,
        .dark-mode input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0px 1000px #343a40 inset !important;
            -webkit-text-fill-color: #fff !important;
        }
        
        /* Mode Terang (Default) */
        body {
            color: #000000; /* Hitam */
        }
    </style>
</head>

<!-- hold-transition login-page dark-mode -->
<body class="hold-transition login-page">
<div class="login-box">
    <div class="login-logo">
        <a href="#"><b>AppName</b></a>
        <p style="font-size: 1.2rem; margin-top: -10px;"></p>
    </div>
  <div class="card">
    <div class="card-body login-card-body">
        <a id="toggle-dark" href="#" role="button" title="Toggle Dark Mode">
            Select Theme <i class="fas fa-moon"></i>
        </a>
      <p class="login-box-msg"></p>

      <form th:action="@{/doLogin}" method="post">
        <div class="input-group mb-3">
          <input type="text" name="username" class="form-control" placeholder="Username">
          <div class="input-group-append">
            <div class="input-group-text"><span class="fas fa-user"></span></div>
          </div>
        </div>
        <div class="input-group mb-3">
          <input type="password" name="password" class="form-control" placeholder="Password">
          <div class="input-group-append">
            <div class="input-group-text"><span class="fas fa-lock"></span></div>
          </div>
        </div>
        <div class="row">
          <div class="col-12">
            <button type="submit" class="btn btn-primary btn-block">Login</button>
          </div>
        </div>
      </form>

      <div th:if="${param.error}" class="alert alert-danger p-2 mt-2" style="font-size: 0.9rem;">
          <i class="fas fa-exclamation-triangle"></i> Login gagal!
      </div>
      <div th:if="${param.logout}" class="alert alert-success p-2 mt-2" style="font-size: 0.9rem;">
          <i class="fas fa-check-circle"></i> Anda telah logout
      </div>
    </div>
  </div>
</div>
<th:block th:replace="fragments/head :: script-resources"></th:block>
<!--<script th:src="@{/adminlte/plugins/jquery/jquery.min.js}"></script>
<script th:src="@{/adminlte/plugins/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/adminlte/js/adminlte.min.js}"></script>-->

</body>
</html>
